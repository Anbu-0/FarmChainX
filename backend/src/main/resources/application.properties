
# =====================================================
# LOCAL DEVELOPMENT CONFIG — change DB password if needed
# =====================================================

# Database Connection (localhost MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/farmchainx?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=user

# JPA (Hibernate) Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Settings
server.port=8080

# Better Logging
logging.level.org.hibernate.SQL=DEBUG

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Frontend URL (localhost for local dev)
frontend.url=http://localhost:4200

app.spa.enabled=true

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
